<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevOps Zero To Hero</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family: 'Inter', sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
background-size:300% 300%;
animation:bgMove 15s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
padding:40px;
max-width:900px;
}

/* Title */

h1{
font-size:3rem;
font-weight:700;
background:linear-gradient(90deg,#00d2ff,#7b2ff7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

/* Subtitle */

.subtitle{
color:#cbd5e1;
margin-bottom:20px;
font-size:1rem;
}

/* Badge */

.badge{
display:inline-block;
padding:6px 18px;
border-radius:999px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
margin-bottom:25px;
font-size:.9rem;
color:#c4b5fd;
}

/* Pipeline text */

.pipeline{
margin-bottom:35px;
font-size:.9rem;
color:#94a3b8;
letter-spacing:.08em;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

/* Card style */

.card{

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;

padding:30px 20px;

backdrop-filter:blur(10px);

transition:all .35s ease;
cursor:pointer;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,0.35);
border-color:#7b2ff7;
}

/* subtle glow */

.card::before{
content:"";
position:absolute;
width:150%;
height:150%;
background:radial-gradient(circle,rgba(123,47,247,.4),transparent);
top:-40%;
left:-40%;
opacity:0;
transition:.4s;
}

.card:hover::before{
opacity:.5;
}

/* card text */

.card span{

display:block;
font-size:.75rem;
letter-spacing:.12em;
color:#94a3b8;
margin-bottom:10px;
}

.card strong{
font-size:1.3rem;
font-weight:600;
}

/* footer */

.footer{
margin-top:40px;
font-size:.8rem;
color:#64748b;
}

/* Responsive */

@media (max-width:600px){

h1{
font-size:2.2rem;
}

.cards{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h1>DevOps Zero To Hero</h1>

<div class="subtitle">
Complete DevSecOps learning journey with real CI/CD pipelines
</div>

<div class="badge">
Josh Batch 10 • USA Edition v2
</div>

<div class="pipeline">
⚙️ Build • 🧪 Test • 🔍 Lint • 🚀 Deploy via GitHub Actionssss
</div>

<div class="cards">

<div class="card">
<span>Framework</span>
<strong>Flask 3.1</strong>
</div>

<div class="card">
<span>Runtime</span>
<strong>Python 3.14</strong>
</div>

<div class="card">
<span>Deploy</span>
<strong>AWS ECS</strong>
</div>

<div class="card">
<span>CI/CD</span>
<strong>GitHub Actions</strong>
</div>

</div>

<div class="footer">
DevSecOps • Cloud Native • Automation First
</div>

</div>

</body>
</html>
