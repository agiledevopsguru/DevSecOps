# uses Trivy image scanner for CVE's i.e applicable for Docker Image so no code is needed here
name: Image Scanner

on:
  workflow_call:
    
jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}  #nandan56
          password: ${{ secrets.DOCKERHUB_TOKEN }} # token from dockerhub access token


      - name: Trivy scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha }}  # we add, because to inform trivy that my image is present in this path so scan this image
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          trivyignore: ${{ github.workspace }}/.trivyignore