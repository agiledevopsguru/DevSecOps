# this will deploy the safe / secure / tested app to prod server
name: Deploy to Server

on:
  workflow_call:
    
jobs:

  deploy:

   env:
     DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
     DOCKER_TAG: ${{ github.sha }}

   runs-on: ubuntu-latest

   steps:
     - name: checkout code
       uses: actions/checkout@v4

     - name: Set DOCKER_TAG environment variable
       run: |
         echo "DOCKER_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

     - name: SSH to prod Server
       uses: appleboy/ssh-action@v1.0.3
       with:
         host: ${{ secrets.EC2_SSH_HOST }}
         username: ${{ secrets.EC2_SSH_USER }}
         key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
         script: |
           echo "Installing required packages and folders"
           sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
           sudo usermod -aG docker $USER
           mkdir -p DevOps
  

     -  name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/devops

     - name: SSH to prod Server and run the app
       uses: appleboy/ssh-action@v1.0.3
       with:
         host: ${{ secrets.EC2_SSH_HOST }}
         username: ${{ secrets.EC2_SSH_USER }}
         key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
         script: |
           echo "Running App"
           export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
           export DOCKER_TAG=${{ github.sha }}
           echo ${{ github.sha }}
           echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ vars.DOCKERHUB_USER }} --password-stdin
           cd ~/devops && docker compose down && docker compose pull && docker compose up -d --force-recreate